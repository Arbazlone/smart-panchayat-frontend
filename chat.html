<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#2E7D32">
    <title>Village Chat - Smart Panchayat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #E8ECF0;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            height: 100vh;
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.08);
        }
        
        /* ===== SIDEBAR ===== */
        .chat-sidebar {
            width: 340px;
            border-right: 1px solid #E8ECF0;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .sidebar-header {
            padding: 18px 16px;
            border-bottom: 1px solid #E8ECF0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        
        .new-chat-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #2E7D32;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .new-chat-btn:hover { background: #1B5E20; }
        
        .chat-search {
            padding: 12px 14px;
        }
        
        .chat-search input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #E0E4E8;
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
            background: #F5F7FA;
        }
        
        .chat-search input:focus {
            border-color: #2E7D32;
            background: white;
        }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        
        /* Village Chat */
        .village-chat {
            padding: 14px 16px;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border-bottom: 1px solid #A5D6A7;
        }
        
        .village-chat:hover { background: linear-gradient(135deg, #C8E6C9, #A5D6A7); }
        
        .village-chat.active {
            background: linear-gradient(135deg, #2E7D32, #1B5E20);
            color: white;
        }
        
        .village-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #2E7D32;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        
        .village-chat.active .village-avatar {
            background: white;
            color: #2E7D32;
        }
        
        .village-info { flex: 1; min-width: 0; }
        
        .village-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1B5E20;
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }
        
        .village-chat.active .village-name { color: white; }
        
        .village-last {
            font-size: 0.8rem;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .village-chat.active .village-last { color: rgba(255,255,255,0.8); }
        
        .village-time {
            font-size: 0.7rem;
            color: #888;
            font-weight: 400;
        }
        
        .village-chat.active .village-time { color: rgba(255,255,255,0.7); }
        
        /* Section Header */
        .chat-section-header {
            padding: 16px 16px 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Conversation Items (Personal Chats) */
        .conversation-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s;
            border-bottom: 1px solid #F0F3F6;
        }
        
        .conversation-item:hover { background: #F8FAFB; }
        
        .conversation-item.active {
            background: #E8F5E9;
            border-left: 3px solid #2E7D32;
        }
        
        .conversation-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .conversation-info { flex: 1; min-width: 0; }
        
        .conversation-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .online-indicator {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-block;
        }
        
        .conversation-last-message {
            font-size: 0.8rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        
        .conversation-time {
            font-size: 0.7rem;
            color: #aaa;
            flex-shrink: 0;
        }
        
        .unread-badge {
            background: #2E7D32;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 10px;
            margin-left: 6px;
        }
        
        /* ===== MAIN CHAT ===== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #F0F2F5;
        }
        
        .chat-header {
            padding: 14px 20px;
            background: white;
            border-bottom: 1px solid #E8ECF0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: #2E7D32;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        
        .chat-header-info h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        
        .chat-header-info p {
            font-size: 0.75rem;
            color: #888;
            margin-top: 1px;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .message-date-divider {
            text-align: center;
            margin: 12px 0;
        }
        
        .message-date-divider span {
            background: #E8ECF0;
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: #666;
            font-weight: 500;
        }
        
        .message {
            display: flex;
            gap: 8px;
            max-width: 80%;
            animation: msgIn 0.25s ease;
        }
        
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-content {
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.4;
            color: #333;
        }
        
        .message.received .message-content {
            background: white;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        
        .message.sent .message-content {
            background: #DCF8C6;
            border-bottom-right-radius: 4px;
        }
        
        .message-time {
            font-size: 0.65rem;
            color: #999;
            margin-top: 2px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #bbb;
        }
        
        .empty-state i { font-size: 4rem; margin-bottom: 16px; opacity: 0.3; }
        
        .message-input-area {
            padding: 12px 18px;
            background: white;
            border-top: 1px solid #E8ECF0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .message-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #E0E4E8;
            border-radius: 20px;
            font-size: 0.9rem;
            outline: none;
            background: #F5F7FA;
        }
        
        .message-input-area input:focus {
            border-color: #2E7D32;
            background: white;
        }
        
        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #2E7D32;
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .send-btn:hover { background: #1B5E20; }
        
        .send-btn:active { transform: scale(0.95); }
        
        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .chat-sidebar { width: 100%; }
            .chat-main {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                z-index: 100;
            }
            .chat-main.active { display: flex; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="chat-sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-comments" style="color:#2E7D32;"></i> Messages</h3>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            <div class="chat-search">
                <input type="text" id="searchChatInput" placeholder="🔍 Search conversations...">
            </div>
            
            <div class="chat-list" id="conversationList">
                <!-- Village Community Chat -->
                <div class="village-chat active" data-chat="village" id="villageChatItem">
                    <div class="village-avatar">
                        <i class="fas fa-tree"></i>
                    </div>
                    <div class="village-info">
                        <div class="village-name">
                            🏘️ Village Community
                            <span class="village-time" id="villageLastTime"></span>
                        </div>
                        <div class="village-last" id="villageLastMessage">Loading messages...</div>
                    </div>
                </div>
                
                <!-- Personal Chats Container -->
                <div id="individualChats"></div>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="chat-main" id="chatMain">
            <div class="chat-header">
                <button class="back-btn" style="display:none;background:#f0f0f0;border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;margin-right:4px;" onclick="document.getElementById('chatMain').classList.remove('active')">
                    <i class="fas fa-arrow-left" style="font-size:14px;"></i>
                </button>
                <div class="chat-header-avatar" id="chatAvatar">
                    <i class="fas fa-users"></i>
                </div>
                <div class="chat-header-info">
                    <h3 id="currentChatName">🏘️ Village Community</h3>
                    <p id="chatSubtitle">Public Chat • Everyone can message</p>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>No messages yet. Start the conversation!</p>
                </div>
            </div>
            
            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" id="sendMessageBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <!-- New Chat Modal -->
    <div class="modal-overlay" id="newChatModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>New Chat</h3>
                <button class="modal-close" onclick="closeNewChatModal()">&times;</button>
            </div>
            <input type="text" class="form-input" id="userSearchInput" placeholder="Search by name or phone">
            <div id="userSearchResults" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="js/utils.js"></script>
    <script src="js/chat.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Show back button on mobile
            if (window.innerWidth <= 768) {
                const backBtn = document.querySelector('.back-btn');
                if (backBtn) backBtn.style.display = 'flex';
            }
            console.log('✅ Chat UI ready');
        });
    </script>
</body>
</html>
