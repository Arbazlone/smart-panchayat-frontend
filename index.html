<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Smart Panchayat - Connect with your village community">
    <meta name="theme-color" content="#2E7D32">
    <title>Smart Panchayat - Village Connect</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* ============================================ */
        /* PROFESSIONAL LOGIN/SIGNUP - MOBILE FIRST */
        /* ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #2E7D32;
            --primary-dark: #1B5E20;
            --primary-light: #4CAF50;
            --accent: #FF6F00;
            --gray-50: #FAFAFA;
            --gray-100: #F5F5F5;
            --gray-200: #EEEEEE;
            --gray-600: #757575;
            --gray-800: #424242;
            --success: #43A047;
            --error: #E53935;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
            --shadow-lg: 0 16px 32px rgba(0,0,0,0.12);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }
        
        /* Main Container */
        .auth-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: var(--shadow-md);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .logo-icon i {
            font-size: 36px;
            color: white;
        }
        
        .logo-section h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        
        .logo-section p {
            font-size: 14px;
            color: var(--gray-600);
            font-weight: 400;
        }
        
        /* Auth Card */
        .auth-card {
            background: white;
            border-radius: 28px;
            padding: 28px 24px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: var(--gray-100);
            padding: 4px;
            border-radius: 16px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 14px 8px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        
        .auth-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: -1;
        }
        
        .auth-tab.active {
            color: var(--primary);
            background: white;
            box-shadow: var(--shadow-sm);
        }
        
        /* Forms */
        .auth-form {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .auth-form.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-600);
            font-size: 16px;
            transition: color 0.2s ease;
        }
        
        .input-field {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid var(--gray-200);
            border-radius: 16px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            transition: all 0.2s ease;
            outline: none;
        }
        
        .input-field:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }
        
        .input-field:focus + i,
        .input-wrapper:focus-within i {
            color: var(--primary);
        }
        
        .input-field.error {
            border-color: var(--error);
        }
        
        .error-message {
            font-size: 12px;
            color: var(--error);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        
        /* Password Strength */
        .password-strength {
            margin-top: 8px;
        }
        
        .strength-bar {
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
            border-radius: 2px;
        }
        
        .strength-text {
            font-size: 12px;
            font-weight: 500;
        }
        
        /* Checkbox */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        
        .checkbox-wrapper label {
            font-size: 14px;
            color: var(--gray-600);
            cursor: pointer;
        }
        
        .checkbox-wrapper a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(46, 125, 50, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .divider span {
            padding: 0 16px;
            font-size: 13px;
            color: var(--gray-600);
            font-weight: 500;
        }
        
        /* Social Login */
        .social-login {
            display: flex;
            gap: 12px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--gray-200);
            border-radius: 16px;
            background: white;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-800);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .social-btn:hover {
            border-color: var(--primary);
            background: var(--gray-50);
        }
        
        .social-btn i {
            font-size: 18px;
        }
        
        /* Footer Links */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--gray-600);
        }
        
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        /* OTP Section */
        .otp-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-200);
        }
        
        .otp-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .otp-input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            background: var(--gray-50);
            transition: all 0.2s ease;
        }
        
        .otp-input:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }
        
        .otp-timer {
            text-align: center;
            font-size: 14px;
            color: var(--gray-600);
            margin-bottom: 16px;
        }
        
        .otp-timer span {
            font-weight: 700;
            color: var(--primary);
        }
        
        .resend-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            padding: 8px;
        }
        
        .resend-btn:disabled {
            color: var(--gray-400);
            cursor: not-allowed;
        }
        
        /* Features Section */
        .features {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 24px;
        }
        
        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .feature i {
            font-size: 24px;
            color: var(--primary);
            background: rgba(46, 125, 50, 0.1);
            padding: 10px;
            border-radius: 12px;
        }
        
        .feature span {
            font-size: 12px;
            color: var(--gray-600);
        }
        
        /* Mobile Optimizations */
        @media (max-width: 480px) {
            body {
                padding: 12px;
                align-items: flex-start;
            }
            
            .auth-container {
                margin-top: 20px;
            }
            
            .auth-card {
                padding: 20px 16px;
            }
            
            .logo-icon {
                width: 60px;
                height: 60px;
            }
            
            .logo-section h1 {
                font-size: 24px;
            }
            
            .input-field {
                padding: 14px 14px 14px 44px;
                font-size: 16px;
            }
            
            .btn {
                padding: 14px;
            }
            
            .otp-input {
                width: 42px;
                height: 50px;
                font-size: 20px;
            }
            
            .features {
                gap: 20px;
            }
        }
        
        /* Desktop Optimizations */
        @media (min-width: 768px) {
            .auth-container {
                max-width: 440px;
            }
        }
        
        /* Toast Customization */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        
        /* Hidden */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-tree"></i>
            </div>
            <h1>Smart Panchayat</h1>
            <p>Connect with your village community</p>
        </div>
        
        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="signup">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <label class="input-label">Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" 
                               class="input-field" 
                               id="loginPhone" 
                               placeholder="Enter 10-digit number"
                               inputmode="numeric"
                               maxlength="10">
                    </div>
                    <div class="error-message hidden" id="loginPhoneError"></div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" 
                               class="input-field" 
                               id="loginPassword" 
                               placeholder="Enter your password">
                    </div>
                    <div class="error-message hidden" id="loginPasswordError"></div>
                </div>
                
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                    <a href="#" style="margin-left: auto;">Forgot?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                
                <div class="divider">
                    <span>or continue with</span>
                </div>
                
                <div class="social-login">
                    <button type="button" class="social-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fab fa-facebook"></i> Facebook
                    </button>
                </div>
            </form>
            
            <!-- Signup Form -->
            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <label class="input-label">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" 
                               class="input-field" 
                               id="signupName" 
                               placeholder="Enter your full name">
                    </div>
                    <div class="error-message hidden" id="signupNameError"></div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" 
                               class="input-field" 
                               id="signupPhone" 
                               placeholder="10-digit mobile number"
                               inputmode="numeric"
                               maxlength="10">
                    </div>
                    <div class="error-message hidden" id="signupPhoneError"></div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" 
                               class="input-field" 
                               id="signupPassword" 
                               placeholder="Create a strong password">
                    </div>
                    <div class="password-strength hidden" id="passwordStrength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-text" id="strengthText"></span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" 
                               class="input-field" 
                               id="signupConfirmPassword" 
                               placeholder="Re-enter your password">
                    </div>
                    <div class="error-message hidden" id="signupConfirmError"></div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Occupation</label>
                    <div class="input-wrapper">
                        <i class="fas fa-briefcase"></i>
                        <select class="input-field" id="signupOccupation">
                            <option value="">Select occupation</option>
                            <option value="farmer">🌾 Farmer</option>
                            <option value="teacher">📚 Teacher</option>
                            <option value="business">💼 Business</option>
                            <option value="student">🎓 Student</option>
                            <option value="service">🔧 Service Provider</option>
                            <option value="other">📌 Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="termsCheck">
                    <label for="termsCheck">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
                </div>
                
                <button type="submit" class="btn btn-primary" id="signupBtn">
                    <span>Create Account</span>
                    <i class="fas fa-user-plus"></i>
                </button>
                
                <!-- OTP Section (hidden initially) -->
                <div class="otp-section hidden" id="otpSection">
                    <p style="text-align: center; font-size: 14px; color: var(--gray-600); margin-bottom: 16px;">
                        <i class="fas fa-shield-alt"></i> 
                        Enter the 6-digit code sent to your phone
                    </p>
                    
                    <div class="otp-inputs">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                    </div>
                    
                    <div class="otp-timer">
                        Resend code in <span id="otpTimer">02:00</span>
                        <button class="resend-btn" id="resendOtpBtn" disabled>Resend</button>
                    </div>
                    
                    <button type="button" class="btn btn-primary" id="verifyOtpBtn">
                        <span>Verify & Continue</span>
                        <i class="fas fa-check"></i>
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Features -->
        <div class="features">
            <div class="feature">
                <i class="fas fa-shield-alt"></i>
                <span>Secure</span>
            </div>
            <div class="feature">
                <i class="fas fa-bolt"></i>
                <span>Fast</span>
            </div>
            <div class="feature">
                <i class="fas fa-users"></i>
                <span>Community</span>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="auth-footer">
            <p>By continuing, you agree to our <a href="#">Terms</a></p>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Smooth tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                const tabName = this.dataset.tab;
                document.getElementById('loginForm').classList.toggle('active', tabName === 'login');
                document.getElementById('signupForm').classList.toggle('active', tabName === 'signup');
            });
        });
        
        // Password strength indicator
        const passwordInput = document.getElementById('signupPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const strengthDiv = document.getElementById('passwordStrength');
        
        passwordInput?.addEventListener('input', function() {
            const val = this.value;
            if (val.length > 0) {
                strengthDiv.classList.remove('hidden');
                
                let strength = 0;
                if (val.length >= 6) strength++;
                if (/[a-z]/.test(val) && /[A-Z]/.test(val)) strength++;
                if (/[0-9]/.test(val)) strength++;
                if (/[^a-zA-Z0-9]/.test(val)) strength++;
                
                const percent = (strength / 4) * 100;
                strengthFill.style.width = percent + '%';
                
                if (strength <= 1) {
                    strengthFill.style.background = '#E53935';
                    strengthText.textContent = 'Weak';
                    strengthText.style.color = '#E53935';
                } else if (strength === 2) {
                    strengthFill.style.background = '#FFA000';
                    strengthText.textContent = 'Fair';
                    strengthText.style.color = '#FFA000';
                } else if (strength === 3) {
                    strengthFill.style.background = '#4CAF50';
                    strengthText.textContent = 'Good';
                    strengthText.style.color = '#4CAF50';
                } else {
                    strengthFill.style.background = '#2E7D32';
                    strengthText.textContent = 'Strong';
                    strengthText.style.color = '#2E7D32';
                }
            } else {
                strengthDiv.classList.add('hidden');
            }
        });
        
        // OTP input auto-focus
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                if (this.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });
        
        console.log('✅ Smart Panchayat Auth Ready');
    </script>
    <script src="js/translate.js"></script>
</body>
</html>
