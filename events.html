<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2E7D32">
    <title>Village Events - Smart Panchayat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
    
    <style>
        .events-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .events-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .events-header h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0;
        }
        
        .events-header h1 i {
            color: var(--primary-green);
        }
        
        .event-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--gray-200);
            padding-bottom: 12px;
        }
        
        .event-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.2s;
        }
        
        .event-tab:hover {
            background: var(--gray-100);
        }
        
        .event-tab.active {
            background: var(--primary-green);
            color: white;
        }
        
        .event-tab i {
            margin-right: 8px;
        }
        
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .event-card {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            transition: all 0.2s;
        }
        
        .event-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary-green-light);
        }
        
        .event-card.urgent {
            border-left: 4px solid var(--error);
        }
        
        .event-card.featured {
            border-left: 4px solid var(--primary-green);
        }
        
        .event-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
        }
        
        .event-date {
            text-align: center;
            min-width: 70px;
            background: var(--primary-green);
            color: white;
            padding: 12px 8px;
            border-radius: 12px;
        }
        
        .event-date .day {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1;
        }
        
        .event-date .month {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .event-date .year {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        
        .event-content {
            flex: 1;
        }
        
        .event-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .event-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-meeting { background: rgba(46, 125, 50, 0.1); color: var(--primary-green); }
        .badge-festival { background: rgba(255, 160, 0, 0.1); color: var(--warning); }
        .badge-emergency { background: rgba(211, 47, 47, 0.1); color: var(--error); }
        .badge-announcement { background: rgba(30, 136, 229, 0.1); color: var(--info); }
        .badge-health { background: rgba(67, 160, 71, 0.1); color: var(--success); }
        
        .event-description {
            color: var(--gray-700);
            margin-bottom: 16px;
            line-height: 1.6;
        }
        
        .event-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 12px;
        }
        
        .event-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--gray-600);
        }
        
        .event-meta-item i {
            width: 20px;
            color: var(--primary-green);
        }
        
        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-200);
        }
        
        .event-organizer {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        
        .event-actions {
            display: flex;
            gap: 8px;
        }
        
        .upcoming-events-sidebar {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--gray-200);
            margin-top: 24px;
        }
        
        .upcoming-events-sidebar h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .mini-event-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-100);
        }
        
        .mini-event-item:last-child {
            border-bottom: none;
        }
        
        .mini-event-date {
            text-align: center;
            min-width: 45px;
            background: var(--gray-100);
            padding: 6px 4px;
            border-radius: 8px;
        }
        
        .mini-event-date .day {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-green);
        }
        
        .mini-event-date .month {
            font-size: 0.65rem;
            text-transform: uppercase;
        }
        
        .mini-event-info {
            flex: 1;
        }
        
        .mini-event-title {
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .mini-event-time {
            font-size: 0.75rem;
            color: var(--gray-500);
        }
        
        .reminder-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(46, 125, 50, 0.1);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--primary-green);
            margin-top: 8px;
        }
        
        @media (max-width: 640px) {
            .events-container {
                padding: 16px;
            }
            
            .event-header {
                flex-direction: column;
                gap: 12px;
            }
            
            .event-date {
                align-self: flex-start;
            }
            
            .event-footer {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            
            .event-actions {
                width: 100%;
            }
            
            .event-actions .btn {
                flex: 1;
            }
            
            .event-tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            
            .event-tabs::-webkit-scrollbar {
                display: none;
            }
            
            .event-tab {
                white-space: nowrap;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="dashboard.html" class="navbar-brand">
                <i class="fas fa-arrow-left"></i>
                <span>Village Events</span>
            </a>
            <div class="flex items-center gap-md">
                <button class="btn btn-primary btn-sm" id="createEventBtn" onclick="eventsManager.showCreateEventModal()">
                    <i class="fas fa-plus"></i> Create Event
                </button>
            </div>
        </div>
    </nav>
    
    <div class="events-container">
        <div class="events-header">
            <h1>
                <i class="fas fa-calendar-alt"></i>
                Village Events & Announcements
            </h1>
        </div>
        
        <div class="event-tabs">
            <button class="event-tab active" data-tab="all">
                <i class="fas fa-list"></i> All Events
            </button>
            <button class="event-tab" data-tab="upcoming">
                <i class="fas fa-calendar-check"></i> Upcoming
            </button>
            <button class="event-tab" data-tab="meetings">
                <i class="fas fa-users"></i> Meetings
            </button>
            <button class="event-tab" data-tab="festivals">
                <i class="fas fa-star"></i> Festivals
            </button>
            <button class="event-tab" data-tab="past">
                <i class="fas fa-history"></i> Past Events
            </button>
        </div>
        
        <div class="events-list" id="eventsList">
            <!-- Skeleton -->
            <div class="event-card skeleton">
                <div class="event-header">
                    <div class="skeleton" style="width:70px;height:80px;border-radius:12px;"></div>
                    <div style="flex:1">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Upcoming Events Sidebar -->
        <div class="upcoming-events-sidebar">
            <h3>
                <i class="fas fa-bell"></i>
                This Week's Events
            </h3>
            <div id="upcomingEventsList">
                <div class="mini-event-item">
                    <div class="mini-event-date">
                        <div class="day">15</div>
                        <div class="month">MAY</div>
                    </div>
                    <div class="mini-event-info">
                        <div class="mini-event-title">Panchayat Meeting</div>
                        <div class="mini-event-time">10:00 AM - Panchayat Hall</div>
                    </div>
                </div>
                <div class="mini-event-item">
                    <div class="mini-event-date">
                        <div class="day">18</div>
                        <div class="month">MAY</div>
                    </div>
                    <div class="mini-event-info">
                        <div class="mini-event-title">Health Camp</div>
                        <div class="mini-event-time">9:00 AM - Primary School</div>
                    </div>
                </div>
            </div>
            <div class="reminder-badge">
                <i class="fas fa-bell"></i>
                <span>2 events this week</span>
            </div>
        </div>
    </div>
    
    <!-- Create Event Modal -->
    <div id="createEventModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="max-width: 500px;">
            <div class="modal-header">
                <h3 class="modal-title">
                    <i class="fas fa-calendar-plus"></i> Create New Event
                </h3>
                <button class="modal-close" onclick="closeCreateEventModal()">×</button>
            </div>
            <form id="createEventForm">
                <div class="form-group">
                    <label class="form-label">Event Title</label>
                    <input type="text" class="form-input" id="eventTitle" placeholder="e.g., Panchayat Meeting" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Event Type</label>
                    <select class="form-input" id="eventType" required>
                        <option value="">Select type</option>
                        <option value="meeting">📋 Panchayat Meeting</option>
                        <option value="festival">🎉 Festival/Celebration</option>
                        <option value="health">🏥 Health Camp</option>
                        <option value="announcement">📢 Announcement</option>
                        <option value="emergency">🚨 Emergency Notice</option>
                        <option value="other">📌 Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-input" id="eventDescription" rows="3" placeholder="Event details..."></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-md">
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-input" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Time</label>
                        <input type="time" class="form-input" id="eventTime" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-input" id="eventLocation" placeholder="e.g., Panchayat Hall" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Organizer</label>
                    <input type="text" class="form-input" id="eventOrganizer" placeholder="e.g., Panchayat Office">
                </div>
                
                <div class="flex gap-md">
                    <button type="button" class="btn btn-outline flex-1" onclick="closeCreateEventModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary flex-1">
                        <i class="fas fa-plus"></i> Create Event
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="js/utils.js"></script>
    <script src="js/events.js"></script>
    <script src="js/translate.js"></script>
    
</body>
</html>
